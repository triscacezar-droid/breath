<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#111" />
    <title>Simple Breath</title>
    <script>
      (function() {
        var s = localStorage.getItem('breath-color-scheme');
        var light = ['light','sepia','solarized-light','one-light','gruvbox-light','github-light','catppuccin-latte'];
        if (s && light.indexOf(s) !== -1) {
          document.documentElement.dataset.theme = s;
          document.querySelector('meta[name="theme-color"]')?.setAttribute('content', '#f5f5f5');
        } else {
          document.documentElement.dataset.theme = 'dark';
          document.querySelector('meta[name="theme-color"]')?.setAttribute('content', '#111');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
